<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Especificidade</title>
    <style>
        h1{
            color: red;
        } /* o !important serve para quebra a especificidade*/
        .titulo{
            color: blue;
        }
        #titulo{ 
            color: green;
        } 

    </style>
</head>
<body>
    <h1 id="titulo" class="titulo">Qual é a minha cor?</h1>
</body>
</html>
