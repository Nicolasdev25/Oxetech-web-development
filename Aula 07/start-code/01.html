<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabelas</title>
    <style>
      body {
        font-family: sans-serif;
      }

      table, th,td{
        border: 1px solid black;
      }
      
      table {
        width: 400px;
        height: 300px;
        border-collapse: collapse;
        
      }

      td{
        text-align: center;
        vertical-align: middle;
      }

    </style>
  </head>
  <body>
    <!-- 
    TABLE -> TABELA
       TR -> TABLW ROW
         TD -> TABLE DATA
         TH -> TABLE HEAD
     -->
    <h1>Introdução à Tabelas</h1>

    <table>
      <tr>
        <th>Coluna1</th>
        <th>Coluna2</th>
        <th>Coluna3</th>
      </tr>
      <tr>
        <td>A1</td>
        <td>B1</td>
        <td>B3</td>
      </tr>
      <tr>
        <td>A2</td>
        <td>B2</td>
        <td>c2</td>
      </tr>
      <tr>
        <td>A3</td>
        <td>B3</td>
        <td>C3</td>
      </tr>

    </table>
  </body>
</html>
