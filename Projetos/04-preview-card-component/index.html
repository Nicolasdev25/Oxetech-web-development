<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Card component</title>
  </head>
  <body>
    <main class="card-container">
      <article class="card">
        <div class="image-wrapper">
          <img
            src="./images/image-equilibrium.jpg"
            alt="Equilibrium"
            class="main-img"
          />
        </div>

        <div class="content">
          <h2>Equilibrium #3429</h2>
          <p>Our Equilibrium collection promotes balance and calm.</p>

          <div class="stats">
            <span class="price">0.041 ETH</span>
            <span class="time-left">3 days left</span>
          </div>

          <hr />

          <div class="author">
            <img
              src="./images/image-avatar.png"
              alt="Jules Wyvern"
              class="avatar"
            />
            <p>Creation of <span>Jules Wyvern</span></p>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
